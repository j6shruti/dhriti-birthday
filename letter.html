<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You 💌</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen">
  <div class="card" id="card">
    <p>Loading your letter...</p>
  </div>
</div>

<script>
  // ---- Security check ----
  if (sessionStorage.getItem("unlocked") !== "true") {
    window.location.href = "index.html";
  }

  // Get the letter id from the URL, e.g. letter.html?id=3
  const params = new URLSearchParams(window.location.search);
  const letterId = parseInt(params.get("id"));

  let wrongAttempts = 0;
  let currentClue = null;

  fetch("clues.json?v=" + Date.now())
    .then(res => res.json())
    .then(clues => {
      currentClue = clues.find(c => c.id === letterId);
      if (!currentClue) {
        document.getElementById("card").innerHTML = "<p>Letter not found.</p>";
        return;
      }
      renderClue();
    })
    .catch(err => {
      document.getElementById("card").innerHTML = "<p>Something went wrong loading this letter. Error: " + err.message + "</p>";
    });

  function renderClue() {
    const completed = JSON.parse(localStorage.getItem("completedLetters") || "[]");
    const alreadyDone = completed.includes(currentClue.id);

    document.getElementById("card").innerHTML = `
      <h1>Letter ${currentClue.id} ✉️</h1>
      <p class="clue-text">"${currentClue.clue}"</p>

      ${alreadyDone ? `
        <p>You already unlocked this one 💛</p>
        <button onclick="showVideo()">Watch Video Again 🎬</button>
      ` : `
        <input type="text" id="guessInput" placeholder="Who is it?">
        <br>
        <button onclick="checkGuess()">Guess</button>
        <div class="error" id="guessError"></div>
        <div id="hintBox"></div>
        <div class="reveal-troll-wrap" id="revealTrollWrap">
          <button type="button" class="reveal-troll" id="revealTroll">Reveal answer 👀</button>
        </div>
        <div class="troll-taunt" id="trollTaunt"></div>
      `}

      <div id="videoBox"></div>
      <span class="back-link" onclick="window.location.href='homepage.html'">← Back to all letters</span>
    `;

    if (alreadyDone) {
      document.getElementById("guessInput")?.remove();
    }

    document.getElementById("guessInput")?.addEventListener("keyup", function(e) {
      if (e.key === "Enter") checkGuess();
    });

    if (!alreadyDone) setupRevealTroll();
  }

  // ---- Runaway "Reveal answer" button: dodges forever, never reveals ----
  function setupRevealTroll() {
    const btn = document.getElementById("revealTroll");
    const taunt = document.getElementById("trollTaunt");
    if (!btn) return;

    const taunts = [
      "nope 😌", "too slow", "not today", "keep trying 🤭",
      "you really thought? 💀", "catch me first", "lol no",
      "figure it out yourself 💛", "nice try", "almost… not"
    ];
    let dodges = 0;

    function dodge() {
      dodges++;
      taunt.textContent = taunts[Math.min(dodges - 1, taunts.length - 1)];
      // Jump to a random spot within the viewport, keeping the button on-screen.
      const w = btn.offsetWidth || 150;
      const h = btn.offsetHeight || 44;
      const maxX = Math.max(0, window.innerWidth - w - 16);
      const maxY = Math.max(0, window.innerHeight - h - 16);
      btn.style.position = "fixed";
      btn.style.left = (8 + Math.random() * maxX) + "px";
      btn.style.top = (8 + Math.random() * maxY) + "px";
      btn.style.transform = "rotate(" + (Math.random() * 30 - 15) + "deg)";
    }

    // Dodge before the pointer can land on it.
    btn.addEventListener("mouseenter", dodge);
    btn.addEventListener("pointerdown", (e) => { e.preventDefault(); dodge(); });
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); dodge(); }, { passive: false });
    // Even a lucky click never reveals anything.
    btn.addEventListener("click", (e) => { e.preventDefault(); dodge(); });
  }

  function checkGuess() {
    const input = document.getElementById("guessInput").value.trim().toLowerCase();
    const correct = currentClue.answer.trim().toLowerCase();
    const errorBox = document.getElementById("guessError");

    if (input === "") return;

    if (input === correct) {
      errorBox.textContent = "";
      markCompleted(currentClue.id);
      showVideo();
    } else {
      wrongAttempts++;
      if (wrongAttempts >= 2) {
        document.getElementById("hintBox").innerHTML = `
          <div class="hint">💡 Hint: ${currentClue.hint}</div>
        `;
      }
      errorBox.textContent = "Not quite... try again 🤔";
    }
  }

  function markCompleted(id) {
    let completed = JSON.parse(localStorage.getItem("completedLetters") || "[]");
    if (!completed.includes(id)) {
      completed.push(id);
      localStorage.setItem("completedLetters", JSON.stringify(completed));
    }
  }

  function showVideo() {
    document.getElementById("guessInput")?.remove();
    document.getElementById("revealTrollWrap")?.remove();
    document.getElementById("revealTroll")?.remove();
    document.getElementById("trollTaunt")?.remove();
    document.querySelector("button")?.remove();
    const hintBox = document.getElementById("hintBox");
    if (hintBox) hintBox.innerHTML = "";
    const guessError = document.getElementById("guessError");
    if (guessError) guessError.textContent = "";
    document.getElementById("videoBox").innerHTML = `
      <p style="margin-top:15px;">You got it! 🎉 Here's your video:</p>
      <iframe src="${currentClue.video}" allow="autoplay" allowfullscreen></iframe>
    `;
  }
</script>

</body>
</html>
