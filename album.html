<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album 📸</title>
<link rel="stylesheet" href="style.css">
<style>
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    max-width: 900px;
    width: 100%;
    margin-top: 20px;
  }
  .gallery img {
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .gallery iframe {
    width: 100%;
    max-width: none;
    aspect-ratio: 16/9;
  }
</style>
</head>
<body>

<div class="screen">
  <div id="card" style="max-width:900px; width:100%;">
    <p>Loading...</p>
  </div>
</div>

<script>
  if (sessionStorage.getItem("unlocked") !== "true") {
    window.location.href = "index.html";
  }

  const sparkles = ["📸","✨","🎈","💫","😂"];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (4 + Math.random() * 4) + "s";
    s.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(s);
  }

  // ---- Add your file IDs here ----
  const albums = {
    bonus: {
      title: "Dhriti Slumber - by Akshay",
      text: "LADIES AND GENTLEMEN, YOU'RE NOT READY FOR THIS.",
      items: [
        { type: "photo", id: "1wbSa3N4sMMYJeGe9eXAv7RgzFpNeIodo" },
        { type: "video", id: "13JleCQ1CV4-OaFKYlTvZQXPkA9CYZl0L" },
        { type: "photo", id: "1sWnJT3FlXgP6wfYvSXPRyLg_wJJmihZg" },
        { type: "video", id: "1tUwW476mnMsUoH7rD4h1iSjFyJbzcBW" },
        { type: "photo", id: "1rkbV6C7mZrsgVhukVetBaJhBagfgjgiB" },
        { type: "video", id: "1gI0lrmPjzZ6Wz15V6OqpnrKvNWYilhSC" },
        { type: "photo", id: "1fVykaSsVYWh5C5_6LiM-b005lgW5tVCo" },
        { type: "video", id: "1SqDSQ8BypyJpz_1cjaqrMb7dp3gQrAO9" }
      ]
    },
    bts: {
      title: "Behind The Scenes 🎬",
      text: "Lol the last BTS wasn't the last time as well, More gossips over call 😘.",
      items: [
        { type: "video", id: "1T34FqOwJm5v8GXuvOEqYz65s_qNc3qFG" },
        { type: "video", id: "1ELX93JTh6VDFmBwKvg0c9p6SkKuF6mme" },
        { type: "video", id: "1Sl24g3DcrqJn2ojukawKH7bU5w-j_HOJ" },
        { type: "video", id: "1WSKYCVXn7c1aDrrifcfq3QRBQK-LPTEm" },
        { type: "video", id: "1iMXj5whHjWu4fGmRR2qLzvcN0HQ8a-zZ" },
        { type: "video", id: "1BC8Xqh_A_tsMnyRfZhPQEhhzbZDm6Sfb" },
        { type: "video", id: "1K7vG2txswFe9GkXPzrTado7fmcY8y0SN" },
        { type: "video", id: "1Ph8x-vElutDfeBOd-gCp9UPG4livBWlM" },
        { type: "video", id: "1gkUBZ1BrzG-h3dfk2__wNCUFEhgwb24N" },
        { type: "video", id: "1H1nDK7FwSI9qA7qnZ01ij_1bKl56-BJ5" },
        { type: "video", id: "1mXOe5Z1rAvAVU5GjcNYnTuOBUEuWNeYQ" },
        { type: "video", id: "1uaDd41XazCy-fLj5d3CQZgQVXTA_yxRw" }
      ]
    },
    blooper: {
      title: "One precious blooper 🎬",
      text: "But jokes apart, he helped me 😋",
      items: [
        { type: "video", id: "1pPyxrYfzRgmpg93lZ_z7Ro5pfl9XNt5k" }
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");
  const data = albums[type];

  if (data) {
    let itemsHTML = "";
    data.items.forEach(item => {
      if (item.type === "photo") {
        itemsHTML += `<img src="https://drive.google.com/thumbnail?id=${item.id}&sz=w1000" loading="lazy">`;
      } else if (item.type === "video") {
        itemsHTML += `<iframe src="https://drive.google.com/file/d/${item.id}/preview" allow="autoplay" allowfullscreen></iframe>`;
      }
    });

    document.getElementById("card").innerHTML = `
      <h1>${data.title}</h1>
      <p>${data.text}</p>
      <div class="gallery">${itemsHTML}</div>
      <br>
      <span class="back-link" onclick="window.location.href='bonus.html'">← Back to bonus round</span>
    `;
  } else {
    document.getElementById("card").innerHTML = "<p>Album not found.</p>";
  }
</script>

</body>
</html>
